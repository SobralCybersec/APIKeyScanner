name: API Key Scanner

on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: api-key-scanner
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: cargo test

  scan:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build
        run: cargo build --release
      
      - name: Run Scanner
        env:
          SCANNER_TOKEN: ${{ secrets.SCANNER_TOKEN }}
        run: |
          if [ -z "$SCANNER_TOKEN" ]; then
            echo "SCANNER_TOKEN is not configured; skipping live GitHub scan."
            exit 0
          fi

          ./target/release/api-key-scanner \
            --token "$SCANNER_TOKEN" \
            --max-requests 10 \
            --no-tui

      - name: Keep Public Output Only
        run: |
          rm -rf private_keys
          rm -f full_keys.json valid_*.json validation_results_*.json validation_results_*.csv scan_report_*.md

      - name: Commit Results (Public Data Only)
        run: |
          if [ ! -f data/latest.json ]; then
            echo "No public output generated; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "Scan results $(date -u +%Y-%m-%d-%H%M)"
          git push
